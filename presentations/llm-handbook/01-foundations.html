<h1 id="module-1----foundations">Module 1 -- Foundations</h1>
<p><strong>Everything else sits on top of this module.</strong> If you only have time for one module, make it this one. The ideas here -- tokens, embeddings, attention, the transformer block -- are the vocabulary the entire field thinks in.</p>

<header>LLM Handbook</header>
<h1 id="why-this-matters">Why This Matters</h1>
<ul>
<li>Every frontier LLM (GPT, Claude, LLaMA, Gemini) is a transformer under the hood</li>
<li>Understanding these foundations lets you reason about cost, speed, and capability</li>
<li>Without this vocabulary, research papers, model cards, and engineering tradeoffs are opaque</li>
<li>This is the shared language of the entire field -- from research to production</li>
</ul>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="3" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="11-tokenization-chopping-text-into-pieces">1.1 Tokenization: Chopping Text into Pieces</h1>
<ul>
<li>Characters explode sequence length (attention is <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.566ex;" xmlns="http://www.w3.org/2000/svg" width="5.832ex" height="2.452ex" role="img" focusable="false" viewBox="0 -833.9 2577.6 1083.9"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D442" d="M740 435Q740 320 676 213T511 42T304 -22Q207 -22 138 35T51 201Q50 209 50 244Q50 346 98 438T227 601Q351 704 476 704Q514 704 524 703Q621 689 680 617T740 435ZM637 476Q637 565 591 615T476 665Q396 665 322 605Q242 542 200 428T157 216Q157 126 200 73T314 19Q404 19 485 98T608 313Q637 408 637 476Z"></path></g><g data-mml-node="mo" transform="translate(763,0)"><path data-c="28" d="M94 250Q94 319 104 381T127 488T164 576T202 643T244 695T277 729T302 750H315H319Q333 750 333 741Q333 738 316 720T275 667T226 581T184 443T167 250T184 58T225 -81T274 -167T316 -220T333 -241Q333 -250 318 -250H315H302L274 -226Q180 -141 137 -14T94 250Z"></path></g><g data-mml-node="msup" transform="translate(1152,0)"><g data-mml-node="mi"><path data-c="1D45B" d="M21 287Q22 293 24 303T36 341T56 388T89 425T135 442Q171 442 195 424T225 390T231 369Q231 367 232 367L243 378Q304 442 382 442Q436 442 469 415T503 336T465 179T427 52Q427 26 444 26Q450 26 453 27Q482 32 505 65T540 145Q542 153 560 153Q580 153 580 145Q580 144 576 130Q568 101 554 73T508 17T439 -10Q392 -10 371 17T350 73Q350 92 386 193T423 345Q423 404 379 404H374Q288 404 229 303L222 291L189 157Q156 26 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 112 180T152 343Q153 348 153 366Q153 405 129 405Q91 405 66 305Q60 285 60 284Q58 278 41 278H27Q21 284 21 287Z"></path></g><g data-mml-node="mn" transform="translate(633,363) scale(0.707)"><path data-c="32" d="M109 429Q82 429 66 447T50 491Q50 562 103 614T235 666Q326 666 387 610T449 465Q449 422 429 383T381 315T301 241Q265 210 201 149L142 93L218 92Q375 92 385 97Q392 99 409 186V189H449V186Q448 183 436 95T421 3V0H50V19V31Q50 38 56 46T86 81Q115 113 136 137Q145 147 170 174T204 211T233 244T261 278T284 308T305 340T320 369T333 401T340 431T343 464Q343 527 309 573T212 619Q179 619 154 602T119 569T109 550Q109 549 114 549Q132 549 151 535T170 489Q170 464 154 447T109 429Z"></path></g></g><g data-mml-node="mo" transform="translate(2188.6,0)"><path data-c="29" d="M60 749L64 750Q69 750 74 750H86L114 726Q208 641 251 514T294 250Q294 182 284 119T261 12T224 -76T186 -143T145 -194T113 -227T90 -246Q87 -249 86 -250H74Q66 -250 63 -250T58 -247T55 -238Q56 -237 66 -225Q221 -64 221 250T66 725Q56 737 55 738Q55 746 60 749Z"></path></g></g></g></svg></mjx-container>)</li>
<li>Whole words explode vocabulary and choke on unseen words</li>
<li><strong>Subword tokenization</strong> balances both -- chunks bigger than characters, smaller than words</li>
<li>Three algorithms: <strong>BPE</strong> (GPT, LLaMA), <strong>WordPiece</strong> (BERT), <strong>Unigram/SentencePiece</strong></li>
<li>Token economy matters: English ~0.75 words/token; code and math are denser</li>
</ul>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="try-it-tokenization">Try It: Tokenization</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> tiktoken
enc = tiktoken.get_encoding(<span class="hljs-string">&quot;cl100k_base&quot;</span>)
enc.encode(<span class="hljs-string">&quot;hello world&quot;</span>)          <span class="hljs-comment"># [15339, 1917]</span>
enc.encode(<span class="hljs-string">&quot; hello world&quot;</span>)         <span class="hljs-comment"># different -- leading space changes first token</span>

<span class="hljs-keyword">from</span> transformers <span class="hljs-keyword">import</span> AutoTokenizer
tokenizer = AutoTokenizer.from_pretrained(<span class="hljs-string">&quot;meta-llama/Llama-3-8B&quot;</span>)
tokens = tokenizer.encode(<span class="hljs-string">&quot;Hello, how are you doing today?&quot;</span>)
decoded = [tokenizer.decode([t]) <span class="hljs-keyword">for</span> t <span class="hljs-keyword">in</span> tokens]
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Token count: <span class="hljs-subst">{<span class="hljs-built_in">len</span>(tokens)}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Decoded: <span class="hljs-subst">{decoded}</span>&quot;</span>)
</code></pre>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="12-embeddings-and-positional-information">1.2 Embeddings and Positional Information</h1>
<ul>
<li>Each token ID maps to a vector via an embedding matrix <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.09ex;" xmlns="http://www.w3.org/2000/svg" width="9.623ex" height="2.022ex" role="img" focusable="false" viewBox="0 -853.7 4253.1 893.7"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D438" d="M492 213Q472 213 472 226Q472 230 477 250T482 285Q482 316 461 323T364 330H312Q311 328 277 192T243 52Q243 48 254 48T334 46Q428 46 458 48T518 61Q567 77 599 117T670 248Q680 270 683 272Q690 274 698 274Q718 274 718 261Q613 7 608 2Q605 0 322 0H133Q31 0 31 11Q31 13 34 25Q38 41 42 43T65 46Q92 46 125 49Q139 52 144 61Q146 66 215 342T285 622Q285 629 281 629Q273 632 228 634H197Q191 640 191 642T193 659Q197 676 203 680H757Q764 676 764 669Q764 664 751 557T737 447Q735 440 717 440H705Q698 445 698 453L701 476Q704 500 704 528Q704 558 697 578T678 609T643 625T596 632T532 634H485Q397 633 392 631Q388 629 386 622Q385 619 355 499T324 377Q347 376 372 376H398Q464 376 489 391T534 472Q538 488 540 490T557 493Q562 493 565 493T570 492T572 491T574 487T577 483L544 351Q511 218 508 216Q505 213 492 213Z"></path></g><g data-mml-node="mo" transform="translate(1041.8,0)"><path data-c="2208" d="M84 250Q84 372 166 450T360 539Q361 539 377 539T419 540T469 540H568Q583 532 583 520Q583 511 570 501L466 500Q355 499 329 494Q280 482 242 458T183 409T147 354T129 306T124 272V270H568Q583 262 583 250T568 230H124V228Q124 207 134 177T167 112T231 48T328 7Q355 1 466 0H570Q583 -10 583 -20Q583 -32 568 -40H471Q464 -40 446 -40T417 -41Q262 -41 172 45Q84 127 84 250Z"></path></g><g data-mml-node="msup" transform="translate(1986.6,0)"><g data-mml-node="TeXAtom" data-mjx-texclass="ORD"><g data-mml-node="mi"><path data-c="211D" d="M17 665Q17 672 28 683H221Q415 681 439 677Q461 673 481 667T516 654T544 639T566 623T584 607T597 592T607 578T614 565T618 554L621 548Q626 530 626 497Q626 447 613 419Q578 348 473 326L455 321Q462 310 <li><strong>Without position info</strong>: &quot;the dog bit the man&quot; = &quot;the man bit the dog&quot; (just a bag of words)</li>
<li>Pure self-attention is <strong>permutation-equivariant</strong> -- we must inject position</li>
</ul>
<p><strong>Positional encoding options:</strong></p>
<ul>
<li>Sinusoidal absolute (original 2017 paper)</li>
<li>Learned absolute (GPT-2) -- doesn't extrapolate past training length</li>
<li><strong>RoPE</strong> (Su et al. 2021) -- rotates Q/K vectors; dominates today</li>
<li><strong>ALiBi</strong> -- linear penalty on distance; no learned params</li>
</ul>

<header>LLM Handbook</header>
<h1 id="13-attention-the-core-mechanism">1.3 Attention: The Core Mechanism</h1>
<p><strong>Analogy:</strong> &quot;The cat sat on the mat because <strong>it</strong> was tired&quot; -- your brain instantly knows &quot;it&quot; = &quot;the cat.&quot; Attention does the same thing: each token looks at every other token and decides how much to focus on each one.</p>
<ul>
<li>Each token produces three vectors:
<ul>
<li><strong>Query</strong> -- &quot;what am I looking for?&quot;</li>
<li><strong>Key</strong> -- &quot;what do I contain?&quot;</li>
<li><strong>Value</strong> -- &quot;what information do I provide if selected?&quot;</li>
</ul>
</li>
</ul>
<footer>cs.kusandriadi.com</footer>
</section>

<header>LLM Handbook</header>
<h1 id="try-it-attention-in-10-lines">Try It: Attention in 10 Lines</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> torch
<span class="hljs-keyword">import</span> torch.nn.functional <span class="hljs-keyword">as</span> F

<span class="hljs-keyword">def</span> <span class="hljs-title function_">attention</span>(<span class="hljs-params">Q, K, V</span>):
    d_k = Q.size(-<span class="hljs-number">1</span>)
    scores = torch.matmul(Q, K.transpose(-<span class="hljs-number">2</span>, -<span class="hljs-number">1</span>)) / d_k**<span class="hljs-number">0.5</span>
    weights = F.softmax(scores, dim=-<span class="hljs-number">1</span>)
    <span class="hljs-keyword">return</span> torch.matmul(weights, V), weights

Q = K = V = torch.randn(<span class="hljs-number">1</span>, <span class="hljs-number">4</span>, <span class="hljs-number">8</span>)  <span class="hljs-comment"># batch=1, seq=4, dim=8</span>
output, weights = attention(Q, K, V)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Attention weights:\n<span class="hljs-subst">{weights[<span class="hljs-number">0</span>]}</span>&quot;</span>)  <span class="hljs-comment"># Each row sums to 1</span>
</code></pre>
<footer>cs.kusandriadi.com</footer>

<h1 id="14-the-transformer-block">1.4 The Transformer Block</h1>
<p>A modern decoder block (pre-norm style) is surprisingly simple:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>h = x + Attn(RMSNorm(x))
y = h + FFN(RMSNorm(h))
</code></pre>

<header>LLM Handbook</header>
<h1 id="try-it-inspect-a-real-model">Try It: Inspect a Real Model</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> transformers <span class="hljs-keyword">import</span> AutoModel

model = AutoModel.from_pretrained(<span class="hljs-string">&quot;gpt2&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Parameters: <span class="hljs-subst">{<span class="hljs-built_in">sum</span>(p.numel() <span class="hljs-keyword">for</span> p <span class="hljs-keyword">in</span> model.parameters()):,}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Layers: <span class="hljs-subst">{model.config.n_layer}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Heads: <span class="hljs-subst">{model.config.n_head}</span>&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;Hidden dim: <span class="hljs-subst">{model.config.n_embd}</span>&quot;</span>)
</code></pre>
<p>GPT-2 Small: ~124M parameters, 12 layers, 12 heads, 768-dim hidden</p>

<header>LLM Handbook</header>
<h1 id="15-decoder-only-vs-encoder-decoder">1.5 Decoder-Only vs. Encoder-Decoder</h1>
<table>
<thead>
<tr>
<th>Architecture</th>
<th>Examples</th>
<th>Attention</th>
<th>Use Case</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Decoder-only</strong></td>
<td>GPT, LLaMA, Claude</td>
<td>Causal (left-to-right)</td>
<td>Generation (dominant)</td>
</tr>
<tr>
<td><strong>Encoder-only</strong></td>
<td>BERT, RoBERTa</td>
<td>Bidirectional</td>
<td>Representations, classification</td>
</tr>
<tr>
<td><strong>Encoder-decoder</strong></td>
<td>T5, BART</td>
<td>Cross-attention</td>
<td>Translation, seq2seq</td>
</tr>
</tbody>
</table>
<p>Modern frontier LLMs are <strong>decoder-only</strong>. The simplicity (one stack, one objective) and empirical scaling have won.</p>
<footer>cs.kusandriadi.com</footer>
</section>

<header>LLM Handbook</header>
<h1 id="exercises">Exercises</h1>
<ol>
<li>Implement scaled dot-product attention in PyTorch (&lt;10 lines). Verify gradient flow on a tiny example.</li>
<li>Build a single-block transformer (<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.186ex;" xmlns="http://www.w3.org/2000/svg" width="6.456ex" height="1.756ex" role="img" focusable="false" viewBox="0 -694 2853.6 776"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D451" d="M366 683Q367 683 438 688T511 694Q523 694 523 686Q523 679 450 384T375 83T374 68Q374 26 402 26Q411 27 422 35Q443 55 463 131Q469 151 473 152Q475 153 483 153H487H491Q506 153 506 145Q506 140 503 129Q490 79 473 48T445 8T417 -8Q409 -10 393 -10Q359 -10 336 5T306 36L300 51Q299 52 296 50Q294 48 292 46Q233 -10 172 -10Q117 -10 75 30T33 157Q33 205 53 255T101 341Q148 398 195 420T280 442Q336 442 364 400Q369 394 369 396Q370 400 396 505T424 616Q424 629 417 632T378 637H357Q351 643 351 645T353 664Q358 683 366 683ZM352 326Q329 405 277 405Q242 405 210 374T160 293Q131 214 119 129Q119 126 119 118T118 106Q118 61 136 44T179 26Q233 26 290 98L298 109L352 326Z"></path></g><g data-mml-node="mo" transform="translate(797.8,0)"><path data-c="3D" d="M56 347Q56 360 70 367H707Q722 359 722 347Q722 336 708 328L390 327H72Q56 332 56 347ZM56 153Q56 168 72 173H708Q722 163 722 153Q722 140 707 133H70Q56 140 56 153Z"></path></g><g data-mml-node="mn" transform="translate(1853.6,0)"><path data-c="36" d="M42 313Q42 476 123 571T303 666Q372 666 402 630T432 550Q432 525 418 510T379 495Q356 495 341 509T326 548Q326 592 373 601Q351 623 311 626Q240 626 194 566Q147 500 147 364L148 360Q153 366 156 373Q197 433 263 433H267Q313 433 348 414Q372 400 396 374T435 317Q456 268 456 210V192Q456 169 451 149Q440 90 387 34T253 -22Q225 -22 199 -14T143 16T92 75T56 172T42 313ZM257 397Q227 397 205 380T171 335T154 278T148 216Q148 133 160 97T198 39Q222 21 251 21Q302 21 329 59Q342 77 347 104T352 209Q352 289 347 316T329 361Q302 397 257 397Z"></path><path data-c="34" d="M462 0Q444 3 333 3Q217 3 199 0H190V46H221Q241 46 248 46T265 48T279 53T286 61Q287 63 287 115V165H28V211L179 442Q332 674 334 675Q336 677 355 677H373L379 671V211H471V165H379V114Q379 73 379 66T385 54Q393 47 442 46H471V0H462ZM293 211V545L74 212L183 211H293Z" transform="translate(500,0)"></path></g></g></g></svg></mjx-container>), train it to copy a 10-token sequence. Watch the attention map develop a diagonal.</li>
<li>Compare BPE tokenization of English, Python code, and Mandarin. Plot tokens-per-byte for each.</li>
<li>Implement RoPE. Verify that rotating both Q and K by the same position gives the same attention score (relative-only property).</li>
</ol>
