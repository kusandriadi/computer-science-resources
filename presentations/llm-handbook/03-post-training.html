</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="1" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>

<h1 id="module-3----post-training">Module 3 -- Post-training</h1>
<p><strong>The intern analogy:</strong> A freshly pre-trained model is like a brilliant but unfiltered intern. It has absorbed enormous knowledge, but it has no idea how to be helpful. Post-training is where you teach it manners -- the transformation from &quot;next-token predictor on the internet&quot; to &quot;useful assistant.&quot;</p>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="2" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="why-this-matters">Why This Matters</h1>
<ul>
<li>Pre-training alone produces a model that predicts what the internet looks like, not one that helps you</li>
<li>Post-training is where the visible character of a model is forged (helpfulness, safety, style)</li>
<li>Understanding RLHF/DPO is essential to grasp how modern assistants behave</li>
<li>The RL-with-verifiable-rewards paradigm produced the wave of reasoning models (o1, R1)</li>
</ul>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="3" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="31-why-post-training">3.1 Why Post-training?</h1>
<p>Ask a base model &quot;How do I make pasta?&quot; and it might:</p>
<ul>
<li>Continue with another question</li>
<li>Paste HTML markup</li>
<li>Write something offensive</li>
</ul>
<p>Post-training molds the base model into:</p>
<ol>
<li><strong>Instruction-following</strong>: respond in the requested form</li>
<li><strong>Helpful, harmless, honest</strong> (Askell et al. 2021)</li>
<li><strong>Tool-using / agentic</strong>: call APIs, structured outputs</li>
<li><strong>Specialized</strong>: domain-tuned (medical, legal, coding)</li>
</ol>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="the-post-training-pipeline">The Post-training Pipeline</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Base Model --&gt; SFT --&gt; Preference Optimization --&gt; Targeted Training
                         (RLHF / DPO)           (tool use, refusals,
                                                   reasoning)
</code></pre>
<p>Steps 2-3 are often iterated multiple times.</p>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="32-supervised-fine-tuning-sft">3.2 Supervised Fine-Tuning (SFT)</h1>
<p>Same loss as pre-training (next-token cross-entropy), but on curated <code>(prompt, response)</code> pairs.</p>
<ul>
<li>Loss is <strong>masked to assistant turns only</strong></li>
<li><strong>Data quality dominates</strong>: a few thousand curated examples &gt; hundreds of thousands of mediocre ones (LIMA, Zhou et al. 2023)</li>
<li>Hyperparameters: 1-3 epochs, LR ~1e-5 to 5e-5</li>
</ul>
<p><strong>Risks:</strong></p>
<ul>
<li><strong>Catastrophic forgetting</strong> -- losing base model capabilities</li>
<li><strong>Hallucination</strong> -- SFT teaches confident answer production even when uncertain</li>
</ul>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="try-it-sft-in-20-lines">Try It: SFT in 20 Lines</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> transformers <span class="hljs-keyword">import</span> AutoModelForCausalLM, AutoTokenizer, TrainingArguments
<span class="hljs-keyword">from</span> trl <span class="hljs-keyword">import</span> SFTTrainer
<span class="hljs-keyword">from</span> datasets <span class="hljs-keyword">import</span> load_dataset

model = AutoModelForCausalLM.from_pretrained(<span class="hljs-string">&quot;Qwen/Qwen2.5-0.5B&quot;</span>)
tokenizer = AutoTokenizer.from_pretrained(<span class="hljs-string">&quot;Qwen/Qwen2.5-0.5B&quot;</span>)
dataset = load_dataset(<span class="hljs-string">&quot;tatsu-lab/alpaca&quot;</span>, split=<span class="hljs-string">&quot;train[:1000]&quot;</span>)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">format_prompt</span>(<span class="hljs-params">example</span>):
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;text&quot;</span>: <span class="hljs-string">f&quot;### Instruction:\n<span class="hljs-subst">{example[<span class="hljs-string">&#x27;instruction&#x27;</span>]}</span>\n\n&quot;</span>
                    <span class="hljs-string">f&quot;### Response:\n<span class="hljs-subst">{example[<span class="hljs-string">&#x27;output&#x27;</span>]}</span>&quot;</span>}

dataset = dataset.<span class="hljs-built_in">map</span>(format_prompt)
trainer = SFTTrainer(
    model=model, train_dataset=dataset, tokenizer=tokenizer,
    args=TrainingArguments(output_dir=<span class="hljs-string">&quot;./sft&quot;</span>, num_train_epochs=<span class="hljs-number">1</span>,
                           per_device_train_batch_size=<span class="hljs-number">4</span>),
    dataset_text_field=<span class="hljs-string">&quot;text&quot;</span>, max_seq_length=<span class="hljs-number">512</span>)
trainer.train()
</code></pre>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="33-rlhf-the-concept">3.3 RLHF: The Concept</h1>
<p>SFT teaches what a good response <em>looks like</em>, but not how to <em>choose</em> good over mediocre.</p>
<p><strong>RLHF</strong> gives the model a sense of &quot;better&quot; and &quot;worse&quot; by learning from human preferences.</p>
<p><strong>Three steps</strong> (InstructGPT, Ouyang et al. 2022):</p>

<h1 id="rlhf-pain-points">RLHF Pain Points</h1>
<ul>
<li><strong>Compute-expensive</strong>: needs 4 model copies (policy, reference, reward, value)</li>
<li><strong>Hyperparameter-sensitive</strong>: KL coefficient, clip range, value loss weight</li>
<li><strong>Reward hacking</strong>: policy exploits RM blind spots</li>
<li><strong>Reward overoptimization</strong>: true preference plateaus then declines as RM score keeps climbing</li>
</ul>

<h1 id="dpo-vs-rlhf-when-each-wins">DPO vs. RLHF: When Each Wins</h1>
<table>
<thead>
<tr>
<th>DPO wins when...</th>
<th>RLHF (PPO/GRPO) wins when...</th>
</tr>
</thead>
<tbody>
<tr>
<td>Simpler infra needed</td>

</tr>
<tr>
<td>Stable, minimal hyperparameters</td>

<header>LLM Handbook</header>
<h1 id="try-it-dpo-loss-function">Try It: DPO Loss Function</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> torch
<span class="hljs-keyword">import</span> torch.nn.functional <span class="hljs-keyword">as</span> F

<span class="hljs-keyword">def</span> <span class="hljs-title function_">dpo_loss</span>(<span class="hljs-params">policy_chosen_logps, policy_rejected_logps,
             ref_chosen_logps, ref_rejected_logps, beta=<span class="hljs-number">0.1</span></span>):
    chosen_rewards = beta * (policy_chosen_logps - ref_chosen_logps)
    rejected_rewards = beta * (policy_rejected_logps - ref_rejected_logps)
    loss = -F.logsigmoid(chosen_rewards - rejected_rewards).mean()
    <span class="hljs-keyword">return</span> loss

<span class="hljs-comment"># The elegance: no reward model needed, just log-probabilities</span>
</code></pre>
<footer>cs.kusandriadi.com</footer>
</section>

<header>LLM Handbook</header>
<h1 id="35-rlaif-and-constitutional-ai">3.5 RLAIF and Constitutional AI</h1>
<p><strong>RLAIF</strong> (Bai et al. 2022): replace human labelers with a strong LLM judge. Massively reduces data cost.</p>
<p><strong>Constitutional AI</strong> (Anthropic):</p>
<ol>
<li><strong>SL-CAI</strong>: model self-critiques and revises against a list of principles (the &quot;constitution&quot;)</li>
<li><strong>RL-CAI</strong>: AI evaluator scores response pairs against principles, trains RM + PPO policy</li>
</ol>
<p>The constitution makes values <strong>explicit and auditable</strong>.</p>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="36-rl-with-verifiable-rewards-the-reasoning-regime">3.6 RL with Verifiable Rewards: The Reasoning Regime</h1>
<p>The most exciting result in post-training from the last two years:</p>
<p>For tasks where correctness is <strong>checkable</strong> (math with known answers, code with unit tests):</p>
<ul>
<li>No learned reward model needed -- the <strong>verifier is the reward</strong></li>
<li>Binary signal: did the code pass? Did the math answer match?</li>
</ul>
<p><strong>GRPO</strong> (DeepSeek-Math/R1): sample <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.05ex;" xmlns="http://www.w3.org/2000/svg" width="1.778ex" height="1.645ex" role="img" focusable="false" viewBox="0 -705 786 727"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D43A" d="M50 252Q50 367 117 473T286 641T490 704Q580 704 633 653Q642 643 648 636T656 626L657 623Q660 623 684 649Q691 655 699 663T715 679T725 690L740 705H746Q760 705 760 698Q760 694 728 561Q692 422 692 421Q690 416 687 415T669 413H653Q647 419 647 422Q647 423 648 429T650 449T651 481Q651 552 619 605T510 659Q492 659 471 656T418 643T357 615T294 567T236 496T189 394T158 260Q156 242 156 221Q156 173 170 136T206 79T256 45T308 28T353 24Q407 24 452 47T514 106Q517 114 529 161T541 214Q541 222 528 224T468 227H431Q425 233 425 235T427 254Q431 267 437 273H454Q494 271 594 271Q634 271 659 271T695 272T707 272Q721 272 721 263Q721 261 719 249Q714 230 709 228Q706 227 694 227Q674 227 653 224Q646 221 643 215T629 164Q620 131 614 108Q589 6 586 3Q584 1 581 1Q571 1 553 21T530 52Q530 53 528 52T522 47Q448 -22 322 -22Q201 -22 126 55T50 252Z"></path></g></g></g></svg></mjx-container> responses per prompt, use group mean as baseline. Drops the value function entirely.</p>
<blockquote>
<p>This produced the wave of reasoning models (o1, DeepSeek-R1). The model learns to plan, backtrack, and verify on its own.</p>
</blockquote>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="37-safety-and-refusal-training">3.7 Safety and Refusal Training</h1>
<ul>
<li><strong>Over-refusal</strong>: refusing benign requests that pattern-match to harmful ones</li>
<li><strong>Under-refusal</strong>: complying with disguised harmful requests</li>
<li><strong>Jailbreaks</strong>: adversarial prompts that bypass refusals</li>
</ul>
<p>Approaches: refusal-augmented SFT data, harmlessness preference data, red-teaming, adversarial benchmarks, Constitutional AI.</p>
<footer>cs.kusandriadi.com</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-header="LLM Handbook" data-footer="cs.kusandriadi.com" data-theme="default" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--header:LLM Handbook;--footer:cs.kusandriadi.com;--theme:default;" data-marpit-pagination-total="18">
<header>LLM Handbook</header>
<h1 id="38-modern-post-training-recipe-2026">3.8 Modern Post-training Recipe (2026)</h1>
<ol>
<li><strong>SFT</strong> on ~100k-1M curated examples. 1-2 epochs.</li>
<li><strong>Preference data collection</strong>: sample from SFT model; label with stronger judge (RLAIF) or humans.</li>

<header>LLM Handbook</header>
<h1 id="exercises">Exercises</h1>
<ol>
<li>SFT a small base model (Pythia-1B) on ~10k OpenAssistant conversations. Compare to the base model on MT-Bench.</li>
<li>Implement DPO from scratch in PyTorch. Train on UltraFeedback. Compare to SFT-only.</li>
<li>Derive the DPO loss from the RLHF objective on paper. Confirm the partition function cancellation.</li>
<li>Train a tiny reward model on preference data. Use it to rerank N=8 samples (best-of-N baseline).</li>
</ol>
